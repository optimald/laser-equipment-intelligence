# Source performance tracking
performance:
  # Success rate thresholds
  thresholds:
    excellent: 0.95
    good: 0.90
    fair: 0.80
    poor: 0.70
  
  # Auto-adjustment rules
  auto_adjustment:
    enabled: true
    
    # Increase crawl frequency for high-performing sources
    frequency_boost:
      threshold: 0.95
      multiplier: 1.5
    
    # Decrease crawl frequency for low-performing sources
    frequency_reduction:
      threshold: 0.70
      multiplier: 0.5
    
    # Pause sources with very low success rates
    auto_pause:
      threshold: 0.50
      duration: 3600  # 1 hour

# Source discovery
discovery:
  enabled: true
  
  # Auto-discovery from social media
  social_media:
    twitter:
      enabled: true
      keywords: ["laser equipment", "medical auction", "clinic closing"]
      rate_limit: 100  # requests per hour
    
    linkedin:
      enabled: true
      keywords: ["asset recovery", "liquidation", "clinic closing"]
      rate_limit: 50  # requests per hour
    
    reddit:
      enabled: true
      subreddits: ["medicaldevices", "UsedGear", "Flipping", "laser", "aesthetic", "dermatology", "cosmeticsurgery", "medicalequipment", "usedmedical", "equipmentforsale"]
      rate_limit: 200  # requests per hour
    
    facebook_groups_api:
      enabled: true
      groups: ["MedicalEquipmentForSale", "UsedMedicalEquipment", "AestheticEquipment", "LaserEquipmentSales", "MedicalDeviceTrading", "CosmeticEquipment", "DermatologyEquipment", "MedicalAuction", "EquipmentLiquidation", "MedicalSurplus"]
      rate_limit: 200  # requests per hour
      requires_auth: true
      auth_method: "api_token"
    
    facebook_groups_session:
      enabled: false  # Disabled by default, requires user credentials
      groups: ["MedicalEquipmentForSale", "UsedMedicalEquipment", "AestheticEquipment", "LaserEquipmentSales", "MedicalDeviceTrading", "CosmeticEquipment", "DermatologyEquipment", "MedicalAuction", "EquipmentLiquidation", "MedicalSurplus"]
      rate_limit: 10  # requests per hour (very limited)
      requires_auth: true
      auth_method: "user_session"
  
  # Manual source submission
  manual_submission:
    enabled: true
    webform_url: "/submit-source"
    email_forwarding: "sources@company.com"

# Data quality requirements
quality:
  # Minimum data completeness
  completeness:
    required_fields: ["brand", "model", "asking_price", "condition"]
    optional_fields: ["serial_number", "year", "hours", "accessories"]
  
  # Data validation rules
  validation:
    price_range:
      min: 100
      max: 1000000
    
    year_range:
      min: 1990
      max: 2025
    
    hours_range:
      min: 0
      max: 50000
  
  # Deduplication rules
  deduplication:
    enabled: true
    fuzzy_match_threshold: 0.85
    time_window: 86400  # 24 hours
