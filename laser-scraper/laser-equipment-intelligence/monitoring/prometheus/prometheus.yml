# Prometheus configuration for laser equipment intelligence platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Scrapyd metrics
  - job_name: 'scrapyd'
    static_configs:
      - targets: ['scrapyd:6800']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Application metrics
  - job_name: 'laser-intelligence'
    static_configs:
      - targets: ['scrapyd:6800']
    metrics_path: '/stats'
    scrape_interval: 30s

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Node exporter (if available)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
